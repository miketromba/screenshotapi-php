name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist
      - run: composer test
      - run: find src tests examples -name "*.php" -print0 | xargs -0 -n1 php -l
